<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Identificação de Porta - UniBB</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Biblioteca para conversão em imagem -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <!-- TELA DO FORMULÁRIO -->
    <div id="setup-form" class="form-container">
        <h2 class="form-title">Gerar Identificação de Porta</h2>
        <form id="form-card">
            <div class="form-group">
                <label>Nome do Curso *</label>
                <input type="text" id="in-curso" placeholder="Ex: Oficina DE&I Aprendizagem" required>
            </div>
            <div class="form-group">
                <label>Primeiro Educador/a *</label>
                <input type="text" id="in-ed1" required>
            </div>
            <div class="form-group">
                <label>Segundo Educador/a (Opcional)</label>
                <input type="text" id="in-ed2">
            </div>
            <div class="form-group">
                <label>Data do evento*</label>
                <input type="text" id="in-data" placeholder="Ex: 10 a 12/03/2026" required>
            </div>
            <div class="form-group">
                <label>Horário *</label>
                <input type="text" id="in-horario" placeholder="Ex: 09h ás 18h" required>
            </div>
            <button type="submit" class="btn-primary">Gerar Visualização</button>
        </form>
    </div>

    <!-- TELA DO RESULTADO -->
    <div id="card-resultado" style="display: none;">
        <div id="capture-area" class="card">
            <div class="content-card">
                <h1><strong>Boas vindas!</strong></h1>
                <div class="info-item"><strong>Curso:</strong> <span id="out-curso"></span></div>
                <div class="info-item"><strong>Educadores/as:</strong> <span id="out-ed1"></span></div>
                <div id="container-ed2"></div>
                <div class="info-item"><strong>Data:</strong> <span id="out-data"></span></div>
                <div class="info-item"><strong>Horário:</strong> <span id="out-horario"></span></div>
                <h2 class="msg-final">Bom curso!</h2>
                <img src="Footer.jpg" alt="Icones UniBB">
            </div>
        </div>

        <div class="botoes-acao">
            <button class="btn-voltar" onclick="voltar()">Alterar</button>
            <button class="btn-download" onclick="baixarImagem()">Baixar Imagem (JPG)</button>
            <button class="btn-download" onclick="baixarPDF()">Baixar PDF</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
